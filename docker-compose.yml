version: '3.9'

services:
  # ── MongoDB ───────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: iitram-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: iitram-alumni
    networks:
      - iitram-net

  # ── Backend ───────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: iitram-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/iitram-alumni
    env_file:
      - ./backend/.env
    depends_on:
      - mongo
    networks:
      - iitram-net

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: iitram-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - iitram-net

networks:
  iitram-net:
    driver: bridge

volumes:
  mongo_data:
